services:
  - type: web
    name: mumu-mini-bot
    env: node
    region: oregon
    plan: free
    buildCommand: npm install --production --ignore-scripts
    startCommand: node silva.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_NAME
        value: MUMU MINI BOT
      - key: OWNER_NUMBER
        value: "263776719736"
      - key: OWNER_NAME
        value: MUMU MINI BOT
      - key: CHANNEL_LINK
        value: https://whatsapp.com/channel/0029VbCKsZSFcow7ucYvJc0J
      - key: CHANNEL_NAME
        value: MUMU MINI BOT
      - key: USE_PAIR_CODE
        value: "true"
      - key: PREFIX
        value: "."
      - key: MODE
        value: both
      - key: ALWAYS_ONLINE
        value: "true"
      - key: AUTO_STATUS_SEEN
        value: "true"
      - key: AUTO_STATUS_REACT
        value: "true"
      - key: ANTIDELETE_GROUP
        value: "true"
      - key: ANTIDELETE_PRIVATE
        value: "true"
      - key: SESSION_ID
        sync: false
      - key: APP_URL
        sync: false
